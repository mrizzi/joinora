<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joinora</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR" crossorigin="anonymous"></script>
</head>
<body>
    <div id="app">
        <div id="join-overlay" class="hidden">
            <div class="join-card">
                <h2 id="join-title">Join Session</h2>
                <p id="join-ended" class="hidden">This session has ended.</p>
                <form id="join-form">
                    <input type="text" id="join-name" placeholder="Your name" maxlength="50" required autocomplete="off">
                    <div id="join-error" class="hidden"></div>
                    <button type="submit" id="join-btn">Join</button>
                </form>
            </div>
        </div>
        <header id="header">
            <div class="header-title">
                <span id="agent-dot" class="agent-dot disconnected"></span>
                <h1 id="session-title">Joinora</h1>
            </div>
            <div id="participants"></div>
        </header>
        <div id="catchup-banner" class="hidden">
            <span id="catchup-text"></span>
            <button type="button" id="catchup-yes">Show summary</button>
            <button type="button" id="catchup-dismiss">Dismiss</button>
        </div>
        <main id="messages"></main>
        <footer id="input-area">
            <textarea id="comment-input" placeholder="Type your message..." rows="2"></textarea>
            <button type="button" id="send-btn">Send</button>
        </footer>
    </div>
    <script src="/app.js"></script>
</body>
</html>
